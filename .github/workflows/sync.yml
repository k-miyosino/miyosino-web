name: Sync Places

on:
  schedule:
    - cron: '0 18 * * 0' # 毎週月曜 AM3:00 JST（= 日曜 18:00 UTC）
  workflow_dispatch: # 手動実行にも対応

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync Places to Kintone
        run: npm run sync:places
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          KINTONE_PLACES_DOMAIN: ${{ secrets.KINTONE_PLACES_DOMAIN }}
          KINTONE_PLACES_APP_ID: ${{ secrets.KINTONE_PLACES_APP_ID }}
          KINTONE_PLACES_API_TOKEN: ${{ secrets.KINTONE_PLACES_API_TOKEN }}
